title: "The Day (London) — Toast to Philip Roche and Stephen Roche at Limerick fête"
date: "1809-10-18"
newspaper: The Day (London)
type: social_report
subject: Toast to the memory of Philip Roche and Stephen Roche at a Limerick commercial meeting
