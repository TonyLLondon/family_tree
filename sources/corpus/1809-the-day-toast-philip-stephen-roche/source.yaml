notes: >
  Report of a fête/commercial meeting at which toasts were given to
  "the memory of Mr. Philip Roche, whose mercantile spirit laid, almost,
  the foundation of Limerick's commercial prosperity" and "the amiable
  memory of Mr. Stephen Roche, the President's Father."
  Also in Dublin Evening Post, 12 Oct 1809.
