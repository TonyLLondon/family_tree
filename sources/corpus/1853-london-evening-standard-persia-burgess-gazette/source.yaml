notes: >
  A 1,110-word article headed "PERSIA" that directly names "Mr. Burgess" as the
  Persian gazette editor, reporting that the gazette was "published by a Persian
  ignoramus while Mr. Burgess was confined to his bed by fever." This matches
  Edward's own letters describing recurring fevers and illness in 1853–54.
  The article also discusses the Persian minister in London.
