significance: |
  COLONIAL CERPA GENERATION: Documents Juan Cerpa Farias (1744-1809) with 
  parents Carlos Cerpa + Maria Farias. Represents earlier colonial generation
  that could connect to our Justo Cerpa (~1775) line. Shows CERPA family 
  presence in Santiago region during mid-1700s.

genealogical_value: |
  - Birth December 1744, death December 1809
  - Parents: Carlos Cerpa + Maria Farias  
  - Location: Santiago region (expanded from Maule region)
  - Potential uncle/cousin relationship to Justo Cerpa
  - Shows geographical spread of colonial CERPA family

research_context: |
  Discovered during systematic search for colonial CERPA ancestors 1720-1780
  period. Part of investigation into Spanish-Picunche mestizo families in
  central Chile. Carlos Cerpa (father) represents target generation for
  further ancestry research.