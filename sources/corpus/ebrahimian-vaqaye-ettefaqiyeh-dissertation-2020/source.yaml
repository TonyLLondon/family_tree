notes: |
  This is the first comprehensive academic analysis of all 471 issues of Iran's first official gazette.
  Provides crucial new quantitative detail: Charles embezzled exactly £30,000 from Abbas Mirza in 1836.
  Confirms Edward's progression from stranded merchant to key figure in Iranian media history.
  Published in peer-reviewed journal specializing in Persian studies.