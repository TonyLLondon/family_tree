notes: >
  Second obituary for Antonio Zerauschek, distinct from the Difesa Adriatica
  piece (corpus/difesa-adriatica-1973-antonio-zerauschek-obituary/). Written
  by an unnamed author who arrived in Zara in 1928 as a young graduate and
  observed Zerauschek from a distance. More personal and impressionistic than
  the Difesa Adriatica obituary; provides the detail that Antonio started as
  a "garzone di bottega" at the Mazzocchi commercial establishment under
  partner Tonti. Mailed to Giuliana (Liana) Rivolta née Zerauschek at Via
  Masaccio 112, 50132 Firenze.
