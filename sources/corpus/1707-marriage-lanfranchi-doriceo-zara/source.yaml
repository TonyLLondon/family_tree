id: 1707-marriage-lanfranchi-doriceo-zara
title: "Marriage register — Francesco Lanfranchi & Francesca Doriceo, 4 June 1707, Zadar (Zara)"
date: "1707-06-04"
place: "Zadar (Zara), Republic of Venice (Dalmazia veneta)"
parish: "Sv. Stošija (St. Anastasia), Zadar — Metropolitan Church"
register: "Duomo di Zara — Marriages 1707"
register_note: "Officiated by the Curate Don Giovanni Battista Cardini under licence of Archbishop Vittorio Priuli. Three banns published, no impediment. Witnesses: Cocchiano, Bratto, the Ponti brothers."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Marriage of Francesco Lanfranchi (Diocese of Bergamo, Lombardy) to
  Francesca Doriceo (daughter of the late Giovanni Doriceo of Zara). The
  surname "Doriceo" is confirmed here; the earlier uncertain "Canovia" reading
  in another record was a different person (Giovanni Maria Canova).
  The bride's name in this entry reads as Francesca; her daughter Margherita's
  1715 baptism names the mother as Margaritta Doriceo — whether Francesca and
  Margaritta are the same person (a double name, common in the period) or
  two Doriceo women (sisters?) is unresolved. See research/image-based-corrections.md
  §28 for the full analysis. This is the deepest confirmed marriage on the
  Lanfranchi line of the Lewis ahnentafel.
