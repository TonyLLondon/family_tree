date: "1825-07-12"
place: "Sv. Stošija (St. Anastasia), Zadar, Kingdom of Dalmatia, Austrian Empire"
parish: "Sv. Stošija (St. Anastasia), Zadar — Metropolitan Church"
register: "Sv. Stošija — Births 1825"
register_note: "Entry 107; born 12 July 1825 at 1 p.m.; baptized 15 August 1825 (Feast of the Assumption)."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Birth of Gerarda Maria Rovaro Brizzi (later styled Geralda), legitimate daughter
  of Giuseppe Rovaro Brizzi (retail salt and tobacco seller) and Anastasia
  Castellanich (seamstress), then resident at Calle S. Michele Nº 590, Zara.
  Parents were married 25 August 1821 in this parish. Godparents: Pietro Battara
  (printer, Calle S. Crisogono); Giovanni Durmanti (printer, Calle S. Rocco
  Nº 26); Antonia Brizzi (washerwoman, likely paternal kin). Marginal annotation
  of death "† 10/III. 1908" appended to this entry.
