title: "Obituary notices for Samuel Lewis (d. 7 Aug 1967)"
description: >
  Three newspaper clippings: (1) English-language death notice listing Samuel Lewis
  of Maesyffynnon, Aberaman, husband of Elizabeth Lily, father of David John and
  Brynmor Keith, funeral 11 Aug 1967 at Glyntaff Crematorium; (2) Welsh-language
  chapel tribute from Carmel Chapel, Trecynon, by Mr D. Llewellyn Jones, recording
  35 years as deacon; (3) Aberdare Leader, 18 Aug 1967, p. 8 — full obituary giving
  career (Scottish Legal Life Assurance Society, district manager, retired 1954),
  Calvinistic Methodist denomination, Oddfellows membership, mourners list including
  brother Tom Lewis, daughter-in-law Jeanette Lewis, and named nephews and nieces.
kind: scan
date: "1967-08"
people:
  - I17   # Samuel Lewis
  - I28   # Elizabeth Lilian Cushen
  - I8    # David John Lewis
  - I73   # Brynmor Keith Lewis
