notes: >
  Death record of Casimiro Carobbi, born Senj (Italian: Segna), Lika-Senj,
  Croatia — son of Giovanni Battista Carobbi — who married Marianna Billicich
  in Kotor on 5 May 1820 and was father of Vittoria Elisa Carobbi (b. 10 October
  1828 Zara, who married Simeone Vincenzo Boara at Sv. Šime, Zara, 8 August
  1849). Death date in the working tree (5 Apr 1866) matches the register year
  on the scan. Field-level register transcription (occupation, age, cause,
  burial parish, address) pending direct reading of the scan.
