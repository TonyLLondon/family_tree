slug: sabalich-guida-zara-addobbati
title: "Guida archeologica di Zara — Addobbati family entry (pp. 503–509)"
author: Giuseppe Sabalich
publication: "Guida archeologica di Zara: con illustrazioni araldiche"
publisher: Tip. di Leone Woditzka
place: Zara [Zadar]
year: 1897
pages: 503–509
language: it
kind: book-excerpt
notes: >
  Seven page-scans (200 DPI JPEG, LEAD Technologies, dated Oct 2003) covering the
  Addobbati family entry in the addenda section of Sabalich's encyclopedic guide to
  Zadar. Pages 503–508 contain the full Addobbati genealogy from Bergamo 1495 through
  the 1886 death of Pietro Paolo; pp. 508–509 cover Abate Francesco Addobbati and the
  Zadar library/archives. The text cites documents then held by Lt. Col. Simeone
  Addobbati q.m Pietro Paolo (I54).
