id: 1811-marriage-addobbati-coltelli-zara
title: "Marriage register — Vincenzo Addobbati & Vincenza Coltelli, Entry nº 13, 25 February 1811, Zadar (Zara)"
date: "1811-02-25"
place: "Sv. Stošija (St. Anastasia), Zadar — under Napoleonic Illyrian Provinces administration"
parish: "Sv. Stošija (St. Anastasia), Zadar — Metropolitan Church"
register: "Sv. Stošija — Marriages 1811"
register_note: "Entry nº 13. Ceremony at 6 p.m. in the bride's house. Officiant D. Antonio Can.co Grazovich."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Filename uses the Italian "Matrimonio". Marriage of Vincenzo Giovanni Domenico
  Valentino Addobbati ("Ivan Vicko" in Croatian noble lists; *Possidente*; b. 24
  Mar 1781 Zara, age "d'anni 30 c.a") to Vincenza Coltelli (*possidente*; b. 4 Apr
  1786 Zara, "d'anni 24"). Both of the groom's parents (Luigi Anzolo Alloisio
  Addobbati and Maddalena Plarinò) are recorded as "fù" (deceased). The bride's
  father, Paolo Coltelli, is *Pubblico Notajo* (public notary); her mother is
  given as "Devina Sandri" (variant of Perina). Five civic witnesses including
  Nicolò Sandri (Justice of the Peace), Francesco Medin, and Alessandro Sanfici
  (notary).
