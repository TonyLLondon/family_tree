id: 1849-marriage-boara-carobbi-zara
title: "Marriage register — Simeone Vincenzo Boara & Vittoria Elisa Carobbi, 8 August 1849, Sv. Šime, Zadar (Zara)"
date: "1849-08-08"
place: "Sv. Šime (San Simeone), Zadar, Kingdom of Dalmatia, Austrian Empire"
parish: "Sv. Šime (San Simeone), Zadar — Collegiate Parish Church"
register: "Sv. Šime — Marriages 1849"
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Marriage of Simeone Vincenzo Boara (Šimun; b. 23 July 1820 Zara; later assessore
  comunale in 1855 and 1891) to Vittoria Elisa Carobbi (b. 10 October 1828 Zara;
  daughter of Casimiro Carobbi of Senj and Marianna Billicich, who had married in
  Kotor, 5 May 1820). The marriage united two of Zara's established Italian
  civic families. The church is the famous Sv. Šime, holding the silver
  sarcophagus of Saint Simeon the Prophet (Queen Elizabeth of Hungary, 1380).
  Field-level register transcription pending direct reading of the scan.
