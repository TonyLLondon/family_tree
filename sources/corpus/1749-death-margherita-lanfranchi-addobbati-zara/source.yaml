notes: >
  Death of Margherita (Regina Margaritta) Lanfranchi, wife of D. Daniele
  Addobbati. Born 26 Dec 1715 Zara (this collection), married 22 Nov 1730 Zara
  at age fourteen, mother of at least Luigi Anzolo Alloisio Addobbati (b. 1 Oct
  1744). Field-level transcription (exact day-and-month, age at death, cause,
  burial parish) pending direct reading of the scan.
