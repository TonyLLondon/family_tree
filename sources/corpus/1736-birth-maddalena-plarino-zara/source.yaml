id: 1736-birth-maddalena-plarino-zara
title: "Baptism register — Maddalena Plarinò, born 4 [Jun?] 1736, baptized [8?] [Jun?] 1736, Duomo di Zara"
date: "1736"
place: "Duomo di Zara (Sv. Stošija / St. Anastasia), Zadar, Republic of Venice (Dalmazia veneta)"
parish: "Sv. Stošija (St. Anastasia), Zadar — Metropolitan Church"
register: "Duomo di Zara — Baptisms 1736"
register_note: "Born li 4 [Jun?] 1736; baptized [8?] [Jun?] 1736 by the Curate at the font of the Duomo. Day-and-month reading partially uncertain on the scan."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Baptism of "una Bambina nata li 4 d.o … figlia del Sig.r D. Pietro Plarinò …
  con la Sig.ra Margherita Canova … posto nome Maddalena". Future wife of
  Luigi Anzolo Alloisio Addobbati (m. 4 April 1766, this collection); mother
  of Vincenzo Addobbati. Older sister Maria Domenica Plarinò also baptized
  in this register run (1734). Field-level day-and-month reading and the
  Curate's name (possibly Michele Corsina, Cathedral Curate in 1732) are
  partially uncertain on the scan; godmother's surname unread.
