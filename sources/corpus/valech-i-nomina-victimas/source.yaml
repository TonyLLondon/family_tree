title: "Nómina de Personas Reconocidas como Víctimas — Comisión Nacional sobre Prisión Política y Tortura (Valech I)"
author: "Comisión Nacional Sobre Prisión Política y Tortura"
date: 2004
language: es
description: >
  Official list of 28,459 persons recognised as victims of political imprisonment
  and torture during Chile's military dictatorship (11 Sep 1973 – 11 Mar 1990).
  Includes main list, persons who did not qualify, reconsideration list, and
  minors born in prison or detained with parents. Image-based PDF (255 pages);
  requires OCR for text extraction.
