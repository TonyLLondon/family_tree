notes: >
  Marriage of Giuseppe Rovaro Brizzi (born and resident Zara; salt and tobacco
  retailer at the time of his daughter's 1825 birth, wholesale tobacco seller by
  1845) to Anastasia Castellanich (b. 1799 Zara, Cucitrice). Date and parish
  cross-attested by their daughter Geralda's 1825 baptism register entry, which
  records "matrimonio del 25 Agosto 1821" in this parish. Field-level register
  transcription pending.
