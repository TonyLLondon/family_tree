id: 1730-marriage-addobbati-lanfranchi-zara
title: "Marriage register — D. Daniele Addobbati & Margherita Lanfranchi, 22 November 1730, Zadar (Zara)"
date: "1730-11-22"
place: "Zadar (Zara), Republic of Venice (Dalmazia veneta)"
parish: "Sv. Stošija (St. Anastasia), Zadar — Metropolitan Church"
register: "Duomo di Zara — Marriages 1730 (Latin)"
register_note: "Officiant Canon Petrus Bado, acting under licence from Archbishop Vincenzo Zmajević. Banns dispensed ('Omissis Publicationibus'). Witnesses: Francesco Armanini and Pietro Pilarino."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Marriage of D. Daniele Addobbati — recently arrived from the Venetian
  Terraferma (Bergamo orbit), three years before the family's formal admission
  as cittadini originari of Zara (13 Nov 1733) — to Margherita Lanfranchi at
  the age of fourteen. The Latin register describes her as "filiam quondam
  Francisci Lanfranchi" — her father Francesco was alive at her 1716 baptism
  but dead by 1730. The marriage predates the Addobbati cittadinanza by three
  years. This is the foundational marriage of the Zara Addobbati line: their
  son Luigi (b. 1744) would carry the family from cittadinanza into Nin nobility
  by 1789.
