id: 1890-marriage-addobbati-boara-zara
title: "Marriage register — Pietro Pio Addobbati & Ottilia Anna Vincenza Boara, Entry N. 8, 12 February 1890, Basilica Metropolitana di Zara"
date: "1890-02-12"
place: "Basilica Metropolitana (Sv. Stošija / St. Anastasia), Zadar, Kingdom of Dalmatia, Austrian Empire"
parish: "Sv. Stošija (St. Anastasia), Zadar — Basilica Metropolitana"
register: "Sv. Stošija — Marriages 1890"
register_note: "Entry N. 8; officiant Mons. Stefano Franc[avieri?], delegated by Dr. Marco [S/Z]accini; banns 19 and 26 January, 2 February 1890."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Marriage of Pietro Pio Addobbati (Imperial-Royal Assistant at the Directorate of
  Posts, b. 5 May 1852 Zara, age 37, bachelor) and Ottilia Anna Vincenza Boara
  (Civile, b. 14 April 1865 Zara, age 24). Four witnesses recorded:
  Mariano Rovaro Brizzi (Lieutenancy accountant, Geralda's kin); Simeone Addobbati
  (k.k. captain, Vienna; the groom's brother); Francesco Kirschner (imperial
  councillor); and Opaludo of Zara. Marginal hand later annotated the groom's
  death as "† 8.4.1919".
