notes: >
  Working hypothesis: this is the marriage of the maternal grandparents of
  Anastasia Castellanich (b. 1799 Zara) — i.e. the parents of the Paletta
  bride who later married a Castellanich groom (1796 marriage in this same
  collection). The Zerauschek family selectively scanned this combination
  precisely because of its Castellanich relevance. Confirmation requires
  reading both this 1776 entry and the 1796 Castellanich × Paletta entry side
  by side and matching the Paletta given names. Field-level register
  transcription pending.
