notes: >
  Local high-resolution scan from the Zerauschek family collection covering the
  Sv. Stošija (Duomo di Zara) baptismal register for 1744. The same baptism is
  cross-attested by DAZD HR-DAZD-342 sig. 52 (23 Dec 1783 certified copy
  "Alvise Anzolo Addobbati, son of Daniele and Margherita") and by Sabalich,
  Guida archeologica di Zara (1897) p. 505.
