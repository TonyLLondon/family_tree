slug: forever-russian-stump-extract
title: "Forever Russian — Stump extract (Henderson collection)"
description: >
  Typed extract from Georges Obolensky, 'Forever Russian: Memoirs of a Vagabond
  Prince' (AuthorHouse, 2013). Covers chapters 1 and 9: Yuri's death from
  malaria (1925), Vera managing the 40+ room B&B on Stump's estate, Georges'
  childhood in Tehran, and his 1954 reunion with Vera after Stump's death.
  Annotated by JPH (07/01/2014).
