id: 1732-marriage-plarino-canova-zara
title: "Marriage register — Pietro Plarinò & Margherita Canova, 19 October 1732, Zadar (Zara)"
date: "1732-10-19"
place: "Zadar (Zara), Republic of Venice (Dalmazia veneta)"
parish: "Sv. Stošija (St. Anastasia), Zadar — Metropolitan Church (likely; Pietro is styled 'Don' at the 1736 baptism of his daughter at the Duomo)"
register: "Duomo di Zara — Marriages 1732"
register_note: "Officiated by Don Pietro Cortese, with dispensation from the three customary banns by Archbishop Vincenzo Zmajević (by written authorization). Ceremony performed in the couple's home ('in Casa di loro habitatione'). Witnesses: Domenico Bonaielli and Giovanni Battista Romani."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Marriage of Sig.r D. Pietro Plarinò to Sig.ra Margherita Canova, daughter of
  the late Giovanni Maria Canova. The church wedding date of 19 October 1732
  is from the parish register. A separate notarial marriage contract dated
  14 February 1732 — the oldest document in the Addobbati family fonds — is
  preserved as DAZD HR-DAZD-342 sig. 45. Future parents of Maddalena Plarinò
  (b. 1736 Zara, m. Luigi Addobbati 4 Apr 1766) and Maria Domenica Plarinò
  (b. 1734 Zara).
