id: 1766-marriage-addobbati-plarino-zara
title: "Marriage register — Luigi Addobbati & Maddalena Plarinò, p. 163, 4 April 1766, Zadar (Zara)"
date: "1766-04-04"
place: "Zadar (Zara), Republic of Venice (Dalmazia veneta)"
parish: "Sv. Stošija (St. Anastasia), Zadar — Metropolitan Church"
register: "Duomo di Zara — Marriages 1766"
register_note: "p. 163. Ceremony in the bride's house with dispensation from banns. Officiant Don Simeone Tatovich. Witnesses: Dr. Giacomo Danieli and Dr. Antonio Danieli (both physicians)."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Marriage of Luigi Addobbati (Anzolo Alloisio at the font, b. 1 Oct 1744 Zara,
  son of D. Daniele Addobbati cittadino and Margherita Lanfranchi; sworn citizen
  27 September 1762) to Maddalena Plarinò (b. 1736 Zara, daughter of Sig.r Pietro
  Plarinò and Margherita Canova). She was approximately 30 years old; he was 21.
  The working tree had recorded "28 Apr 1766" but the register reads clearly
  "4 April".
