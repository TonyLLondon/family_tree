notes: >
  Probable baptism of Margaret Davies (wife of David Griffiths of Llywel).
  Conwil-gaio = Cynwyl Gaeo = Cayo — the birthplace Margaret gave on the 1851 census.
  Birth year 1787 is within 1 year of census-derived ~1786.
  She is the only Margaret David christened at this parish in the 1780s window.
  "Margaret David" is Welsh patronymic for "Margaret daughter of David" = Margaret Davies.
  Father "David Conwil" uses a locative identifier (of Cynwyl).
  Status: probable — not independently confirmed.
