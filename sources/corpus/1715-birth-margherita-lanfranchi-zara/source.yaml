id: 1715-birth-margherita-lanfranchi-zara
title: "Baptism register — Regina Margaritta Lanfranchi, born 26 December 1715 (emergency baptism 2 January 1716; entered 3 March 1716), Duomo di Zara"
date: "1715-12-26"
place: "Duomo di Zara (Sv. Stošija / St. Anastasia), Zadar, Republic of Venice (Dalmazia veneta)"
parish: "Sv. Stošija (St. Anastasia), Zadar — Metropolitan Church"
register: "Duomo di Zara — Baptisms 1715–1716"
register_note: "Emergency home baptism by Don Giorgio Bonicelli on 2 Jan 1716 (registered as '2 Geno: 1715' under the Venetian More Veneto calendar, where the new year began 1 March). Formal entry into the Duomo register on 3 Mar 1716."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Birth and baptism of Regina Margaritta Lanfranchi, daughter of Francesco
  Lanfranchi and Margaritta Doriceo (the bride of the 4 June 1707 Zara
  marriage in this collection — possibly recorded there as Francesca, a
  double name; or possibly a sister). The infant was in danger of dying at
  birth: emergency home baptism "per causa d'imminente necessità". Godfather:
  Giovanni Maria Canova (surname confirmed by the 1732 Plarinò × Canova
  marriage; previously misread as "Canovia"). Future wife of D. Daniele
  Addobbati (m. 22 Nov 1730 Zara), mother of Luigi Anzolo Alloisio Addobbati
  (b. 1 Oct 1744). Died 1749 Zara.
