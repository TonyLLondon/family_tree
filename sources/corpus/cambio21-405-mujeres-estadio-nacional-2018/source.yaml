id: cambio21-405-mujeres-estadio-nacional-2018
title: "Las mujeres víctimas de la dictadura prisioneras en el Estadio Nacional: Conózca en exclusiva los nombres de 405 detenidas en el principal coliseo deportivo en 1973"
author: "Alfredo Peña"
publisher: "Cambio21"
date: 2018-12-31
language: es
description: >
  Cambio21 exclusive publishing the official list of 405 women prisoners detained
  at the Estadio Nacional in 1973, maintained by the Corporación Estadio Nacional
  Memoria Viva (president: Wally Kunstmann). Helia del Carmen Cerpa Pérez appears
  as "CERPA PEREZ HELIA DEL C". Article also details conditions in the women's
  changing rooms (camarín) beside the stadium swimming pool.
