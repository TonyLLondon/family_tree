id: 1845-marriage-addobbati-rovaro-brizzi-zara
title: "Marriage register — Pietro Paolo Addobbati & Gerarda (Geralda) Rovero Brizzi, 26 October 1845, Zadar (Zara)"
date: "1845-10-26"
place: "Parrocchia di S. Simeone (Sv. Šime), Zadar, Kingdom of Dalmatia, Austrian Empire"
parish: "Sv. Šime (San Simeone), Zadar — Collegiate Parish Church"
register: "Sv. Šime — Marriages 1845"
register_note: "Officiant D. Dom. Morovich (administrator). Banns 13, 20, 27 July 1845. Bride underage (20 < Austrian majority of 24); Praetor's consent granted 14 July 1845, two days after her twentieth birthday."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Marriage of Pietro Addobbati (Impiegato, bachelor of S. Simeone parish, b. 27 Apr
  1815) to Gerarda Rovero Brizzi (nubile, b. 12 Jul 1825). Father of the groom —
  Vincenzo Addobbati — recorded as "C. R. Impiegato" though already deceased
  (d. 28 Jan 1839). Witnesses Giuseppe Tenni Cupilli and Giuseppe Sebasticho,
  both ufficiali dei conti della Ragioneria (Lieutenancy accounts officers).
