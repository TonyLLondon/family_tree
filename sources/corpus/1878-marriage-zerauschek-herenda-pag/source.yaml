id: 1878-marriage-zerauschek-herenda-pag
title: "Marriage register — Antonio Zerauschek (sr.) & Anna Herenda, Entry N. 8, 26 January 1878, Pago (Pag)"
date: "1878-01-26"
place: "Pag (Pago) parish, Zara circle, Kingdom of Dalmatia, Austrian Empire"
parish: "Parrocchia di Pago (Pag)"
register: "Pag — Marriages 1878"
register_note: "Entry N. 8; banns read 1, 6, and 13 January 1878."
collection: "Zerauschek family scan collection"
repository: "Private (Zerauschek family papers, scanned)"
notes: >
  Marriage of Antonio Giacomo Vincenzo Zerauschek (carpenter, b. 15 March 1850 Zara,
  son of the deceased Giuseppe Biagio Zerauschek and Antonia Maria Guerino) to
  Anna Herenda (b. 14 February 1859 Pago, daughter of Giovanni Erenda Or Marzo and
  Giuseppina Magassich, both then living, merchants). Witnesses: Andrea Armiani
  (civile, Pago) and Andrea Beveroni / Devercovi (merchant, Novigno). Cross-attested
  by the 1859 Pag birth register of Anna and the 1850 Sv. Stošija birth register of
  Antonio.
