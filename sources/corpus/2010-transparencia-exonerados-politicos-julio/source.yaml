title: "Nómina de Exonerados Políticos — Montos Pagados Julio 2010"
author: "Consejo para la Transparencia / Ministerio del Interior"
date: "2010-07"
language: "es"
description: >
  Transparency disclosure listing all beneficiaries of Chile's political
  exoneree (exonerado político) reparation program as of July 2010, published
  under Chile's Ley de Transparencia (Law 20.285, 2008). Lists beneficiary
  name, former employer (Empresa Exoneración), date of exoneration (political
  dismissal), and monthly pension amount paid in July 2010 (Chilean pesos).
  Reparation pensions are paid under Ley 19.234 (1993) and amendments (Ley
  19.582, 1998; Ley 20.134, 2006) to persons dismissed from public-sector or
  state-enterprise employment for political reasons during the military
  dictatorship (11 Sep 1973 – 10 Mar 1990). The programme had approximately
  157,624 beneficiaries at the time of publication.

remote:
  webpage_url: "https://www.scribd.com/document/41977617/Consejo-Trans-Par-en-CIA-CELPA1-Ver2"

