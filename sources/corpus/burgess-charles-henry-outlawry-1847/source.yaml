notes: |
  Outlawry was a legal remedy for creditors when debtors failed to appear in court.
  The proclamation was published in newspapers and posted at parish church doors.
  "Late of Hampstead" means formerly resident there, not deceased.
  
  Charles Henry Burgess is likely brother of Edward Burgess (consul at Tabriz).
  Both sons of Henry Burgess (merchant, Hinckley / Lombard Street banking agent).
