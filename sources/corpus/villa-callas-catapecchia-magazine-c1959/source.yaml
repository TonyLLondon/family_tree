notes: >
  Single-column clipping, cut off at bottom. Shows exterior photo of Villa Callas
  (three floors plus solarium turret) and inset portrait of Maria Callas.
  Content dates to after the Callas–Meneghini separation (September 1959):
  discusses divorce lawyers, Onassis affair, rumoured Monte Carlo opera appointment.
  States Meneghini bought from "un industriale veronese" three years earlier —
  consistent with the December 1957 purchase from Angelo Marinoni documented
  in the Incom/GBOPERA 1958 reportage.
